<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="description" content="Student Event & Team Management PWA" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mechatronian | Team Hub</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "ee87ca2c-bd88-4bbf-aa71-15ac6c6fd7ad",
          safari_web_id: "web.onesignal.auto.166712e5-2aee-41ea-b95e-8df3d8ab1f28",
          serviceWorkerPath: 'sw.js?v=2', // Version bump to force re-evaluation
          notifyButton: {
            enable: true,
            displayPredicate: async () => {
              const isSubscribed = await OneSignal.User.PushSubscription.optedIn;
              return !isSubscribed;
            }
          },
        });
      });
    </script>
    <style>
      /* Fallback to hide bell container if subscribed */
      .onesignal-bell-container.onesignal-reset {
        display: none !important;
      }
      body:not(.onesignal-subscribed) .onesignal-bell-container.onesignal-reset {
        display: block !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
